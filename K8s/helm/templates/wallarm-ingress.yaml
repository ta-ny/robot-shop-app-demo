apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Release.Name }}-wallarm
  annotations:
    env: {{ .Values.policyAnnotations.env | quote }}
    owner: {{ .Values.policyAnnotations.owner | quote }}
    kubernetes.io/ingress.class: wallarm-ingress
    nginx.ingress.kubernetes.io/wallarm-mode: block
    nginx.ingress.kubernetes.io/wallarm-application: "1"
spec:
  ingressClassName: wallarm-ingress
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 8080
