# DNS stubs for workloads that run on cluster-ab only. No selector — Istio merges remote endpoints.
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  annotations:
    env: {{ .Values.policyAnnotations.env | quote }}
    owner: {{ .Values.policyAnnotations.owner | quote }}
  name: cart
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  annotations:
    env: {{ .Values.policyAnnotations.env | quote }}
    owner: {{ .Values.policyAnnotations.owner | quote }}
  labels:
    service: payment
  name: payment
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  annotations:
    env: {{ .Values.policyAnnotations.env | quote }}
    owner: {{ .Values.policyAnnotations.owner | quote }}
  labels:
    service: rabbitmq
  name: rabbitmq
spec:
  ports:
    - name: tcp-amqp
      port: 5672
      targetPort: 5672
    - name: http-management
      port: 15672
      targetPort: 15672
    - name: tcp-epmd
      port: 4369
      targetPort: 4369
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  annotations:
    env: {{ .Values.policyAnnotations.env | quote }}
    owner: {{ .Values.policyAnnotations.owner | quote }}
  labels:
    service: redis
  name: redis
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
